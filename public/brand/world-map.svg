    <circle cx="455" cy="150" r="7" class="continent-dot"/>
    
    <!-- Africa -->
    <circle cx="420" cy="280" r="7" class="continent-dot"/>
    <circle cx="465" cy="300" r="7" class="continent-dot"/>
    <circle cx="395" cy="320" r="7" class="continent-dot"/>
