<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" width="1200" height="800" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }
      @keyframes pulse-glow {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 0.9; }
      }
      .continent-dot { 
        fill: #a8d5ff;
        animation: pulse-glow 3s ease-in-out infinite;
      }
      .map-group {
        animation: float 6s ease-in-out infinite;
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="transparent"/>
  
  <!-- Animated group -->
  <g class="map-group">
    <!-- North America -->
    <circle cx="120" cy="120" r="7" class="continent-dot"/>
    <circle cx="145" cy="115" r="7" class="continent-dot"/>
    <circle cx="100" cy="135" r="7" class="continent-dot"/>
    <circle cx="130" cy="145" r="7" class="continent-dot"/>
    <circle cx="160" cy="140" r="7" class="continent-dot"/>
    <circle cx="85" cy="150" r="7" class="continent-dot"/>
    <circle cx="175" cy="155" r="7" class="continent-dot"/>
    <circle cx="110" cy="165" r="7" class="continent-dot"/>
    <circle cx="150" cy="170" r="7" class="continent-dot"/>
    <circle cx="95" cy="180" r="7" class="continent-dot"/>
    <circle cx="170" cy="180" r="7" class="continent-dot"/>
    <circle cx="125" cy="190" r="7" class="continent-dot"/>
    
    <!-- South America -->
    <circle cx="160" cy="350" r="7" class="continent-dot"/>
    <circle cx="185" cy="375" r="7" class="continent-dot"/>
    <circle cx="145" cy="390" r="7" class="continent-dot"/>
    <circle cx="200" cy="410" r="7" class="continent-dot"/>
    <circle cx="170" cy="430" r="7" class="continent-dot"/>
    <circle cx="140" cy="450" r="7" class="continent-dot"/>
    <circle cx="210" cy="470" r="7" class="continent-dot"/>
    <circle cx="175" cy="490" r="7" class="continent-dot"/>
    <circle cx="155" cy="510" r="7" class="continent-dot"/>
    <circle cx="190" cy="520" r="7" class="continent-dot"/>
    
    <!-- Europe -->
    <circle cx="410" cy="110" r="7" class="continent-dot"/>
    <circle cx="445" cy="120" r="7" class="continent-dot"/>
    <circle cx="380" cy="130" r="7" class="continent-dot"/>
    <circle cx="470" cy="115" r="7" class="continent-dot"/>
